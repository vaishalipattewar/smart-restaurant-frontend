on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Application Dependencies
        run: npm ci || npm install

      - name: Lint Verification Run
        run: |
          # If your template doesn't have a linter script configured yet, 
          # this syntax ensures the build won't hard break out of the box.
          npm run lint --if-present

      - name: Execute Test Suite
        run: npm test --if-present

  build-and-ship:
    needs: validate-and-test
    # Only push and publish to Docker Hub if the code has been merged/pushed into main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate with Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Frontend Container (With Secrets Injection)
        if: github.event.repository.name == 'smart-restaurant-frontend'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/smart-restaurant-frontend:latest
          build-args: |
            REACT_APP_API_URL=http://${{ secrets.BACKEND_IP }}:5000
            VITE_API_URL=http://${{ secrets.BACKEND_IP }}:5000

